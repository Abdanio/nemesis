<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Pengadaan Kab/Kota - LKPP 2026</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="assets/css/styles.css?v=3" />
    <script defer src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
    <script defer src="assets/js/map.js"></script>
    <script>
        // Default: gunakan origin tempat frontend ini dibuka.
        // Kalau backend kamu beda domain, override value ini sebelum `assets/js/app.js` dijalankan.
        (function () {
            if (window.DASHBOARD_API_BASE_URL) return;

            const isLocal =
                location.hostname === "127.0.0.1" ||
                location.hostname === "localhost";

            // Saat frontend dijalankan via static server (python http.server),
            // endpoint /api tidak ada. Default-kan ke backend lokal Express di port 3000.
            window.DASHBOARD_API_BASE_URL = isLocal
                ? "http://127.0.0.1:3000/api"
                : `${location.origin}/api`;
        })();
    </script>
    <script defer src="assets/js/app.js"></script>
</head>

<body>
    <div class="hdr">
        <div class="hdr-l">
            <div class="logo">AUD</div>
            <div class="hdr-t">
                <h1>Audit Pengadaan per Kab/Kota</h1><span>Artifact hasil analyze &middot; LKPP / SiRUP &middot; Tahun
                    Anggaran 2026</span>
            </div>
        </div>
        <div class="hdr-r">
            <div class="ll"><span class="ldot"></span> LIVE</div>
            <div class="yr">TA 2026</div><button class="mobile-kpi-btn"
                onclick="document.getElementById('kpi').classList.toggle('open')">📊 KPI</button>
        </div>
    </div>
    <div class="kpi-backdrop" onclick="document.getElementById('kpi').classList.remove('open')"></div>
    <div class="kpi" id="kpi"></div>
    <div class="ml">
        <div class="mc">
            <div id="map"></div>
            <div class="moc" id="mf"></div>
            <div class="mlb" id="legend-container">
                <button class="legend-btn"
                    onclick="document.getElementById('legend-container').classList.toggle('open')">ℹ️ Legenda</button>
                <div class="legend-content" id="legend"></div>
            </div>
        </div>
        <div class="sb" id="sidebar">
            <div class="sb-handle" onclick="document.getElementById('sidebar').classList.toggle('expanded')"></div>
            <div class="sbh">
                <div class="sbt" id="tabs"></div>
            </div>
            <div class="sbc" id="sbc"></div>
        </div>
    </div>
    <div class="modal-overlay" id="rupModal">
        <div class="modal">
            <div class="modal-top" id="modalTop"></div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">Map memakai agregasi penuh untuk paket multi-lokasi &middot; KPI nasional tidak
                menduplikasi paket multi-lokasi</div>
        </div>
    </div>
    <div class="bandung-spotlight" id="bandungSpotlight" style="display:none"></div>
</body>

</html>
